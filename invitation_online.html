<!--
  部署步骤：
  ① 去 supabase.com 注册并创建项目
  ② 在 SQL Editor 中执行 supabase_setup.sql（建表 + 行级安全策略）
  ③ 复制项目 URL（Project Settings > API > URL）和 anon key（Project Settings > API > anon public key），替换下方 YOUR_SUPABASE_URL 和 YOUR_ANON_KEY
  ④ 部署本文件到 Vercel / GitHub Pages / Netlify 等静态托管平台即可
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>婚礼请帖 · 张明 & 李婉</title>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --gold: #c8a45c;
    --gold-light: #e0c98a;
    --gold-dark: #9b7d3c;
    --rose: #d4a5a5;
    --rose-light: #f2d5d5;
    --blush: #fdf4f0;
    --white: #fffef9;
    --text: #3d2e1e;
    --text-light: #8b7355;
    --card-bg: rgba(255, 254, 249, 0.95);
    --shadow: 0 8px 40px rgba(139, 115, 85, 0.12);
    --shadow-hover: 0 12px 48px rgba(139, 115, 85, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', serif;
    background: linear-gradient(170deg, #fef5f0 0%, #fdf0ea 20%, #faf0e6 40%, #fef5f0 60%, #fceee9 80%, #fef5f0 100%);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* 花瓣粒子画布 */
  #petals-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* 主容器 */
  .main-container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ---------------- 封面区 ---------------- */
  .hero {
    text-align: center;
    padding: 50px 24px 40px;
    position: relative;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold-light), var(--rose-light), var(--gold-light), var(--rose-light), var(--gold-light));
    border-radius: 20px 20px 0 0;
  }

  .hero-ornament-top {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 16px;
  }
  .hero-ornament-top .line {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .hero-ornament-top .diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  .hero-wreath {
    width: 120px; height: 120px;
    margin: 0 auto 20px;
    border: 2px solid var(--rose-light);
    border-radius: 50%;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    animation: wreathPulse 3s ease-in-out infinite;
  }
  @keyframes wreathPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212, 165, 165, 0.3); }
    50% { box-shadow: 0 0 0 16px rgba(212, 165, 165, 0); }
  }
  .hero-wreath::before {
    content: '♥';
    font-size: 42px;
    color: var(--rose);
    animation: heartBeat 1.5s ease-in-out infinite;
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.08); }
    60% { transform: scale(1); }
  }

  .hero-date-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .hero-title {
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 4px;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .hero-couple {
    display: flex; align-items: center; justify-content: center;
    gap: 18px; margin-top: 10px;
  }
  .hero-couple .name {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 3px;
    position: relative;
  }
  .hero-couple .name::after {
    content: '';
    position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 2px;
    background: var(--gold);
    border-radius: 1px;
  }
  .hero-couple .ampersand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    font-style: italic;
  }

  /* ---------------- 邀请正文 ---------------- */
  .invitation-text {
    background: var(--card-bg);
    padding: 36px 28px;
    text-align: center;
    border-left: 1px solid var(--rose-light);
    border-right: 1px solid var(--rose-light);
  }

  .invitation-text .greeting {
    font-size: 16px;
    color: var(--text-light);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .invitation-text .message {
    font-size: 15px;
    color: var(--text);
    line-height: 2.2;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .invitation-text .ornament-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin: 8px 0;
  }
  .ornament-divider .dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; opacity: 0.5; }
  .ornament-divider .line { width: 36px; height: 1px; background: var(--rose-light); }

  /* ---------------- 信息卡片 ---------------- */
  .info-card {
    background: var(--card-bg);
    padding: 30px 24px;
    margin: 0;
    border-left: 1px solid var(--rose-light);
    border-right: 1px solid var(--rose-light);
  }

  .info-card .section-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold-dark);
    letter-spacing: 3px;
    margin-bottom: 20px;
    position: relative;
  }
  .info-card .section-title::after {
    content: '';
    display: block;
    width: 40px; height: 2px;
    background: var(--gold-light);
    margin: 8px auto 0;
    border-radius: 1px;
  }

  .info-item {
    display: flex; align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px dashed rgba(212, 165, 165, 0.3);
    gap: 14px;
  }
  .info-item:last-child { border-bottom: none; }
  .info-item .icon {
    width: 40px; height: 40px;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--rose-light), var(--blush));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .info-item .info-content { flex: 1; }
  .info-item .label {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .info-item .value {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
  }

  /* ---------------- RSVP 回复区 ---------------- */
  .rsvp-section {
    background: var(--card-bg);
    padding: 30px 24px 36px;
    border-left: 1px solid var(--rose-light);
    border-right: 1px solid var(--rose-light);
  }

  .rsvp-section .section-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold-dark);
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
  .rsvp-section .section-title::after {
    content: '';
    display: block;
    width: 40px; height: 2px;
    background: var(--gold-light);
    margin: 8px auto 0;
    border-radius: 1px;
  }

  .rsvp-form { margin-top: 8px; }
  .form-row {
    margin-bottom: 16px;
    animation: fadeInUp 0.5s ease forwards;
  }
  .form-row label {
    display: block;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .form-row input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e8d5c4;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--white);
    color: var(--text);
    transition: all 0.3s ease;
    outline: none;
  }
  .form-row input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200, 164, 92, 0.1);
  }
  .form-row input::placeholder {
    color: #c4b4a0;
  }

  .rsvp-buttons {
    display: flex; gap: 12px; margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none; border-radius: 12px;
    font-size: 15px; font-family: inherit;
    font-weight: 600; letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  .btn:active::after {
    width: 300px; height: 300px;
  }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    pointer-events: none;
  }
  .btn-attend {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #fff;
    box-shadow: 0 4px 16px rgba(155, 125, 60, 0.3);
  }
  .btn-attend:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(155, 125, 60, 0.4);
  }
  .btn-decline {
    background: #f5f0eb;
    color: var(--text-light);
    border: 1.5px solid #e0d5c8;
  }
  .btn-decline:hover:not(:disabled) {
    background: #ede5db;
    transform: translateY(-2px);
  }

  /* 刷新按钮 */
  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border: 1.5px solid var(--gold-light);
    background: var(--white);
    color: var(--gold-dark);
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: absolute;
    top: 24px;
    right: 24px;
  }
  .refresh-btn:hover {
    background: var(--gold);
    color: #fff;
    border-color: var(--gold);
  }
  .refresh-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .refresh-btn .refresh-icon {
    display: inline-block;
    transition: transform 0.6s ease;
    font-size: 14px;
  }
  .refresh-btn.spinning .refresh-icon {
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .guest-list-header {
    position: relative;
  }
  .guest-list-header .section-title {
    display: inline-block;
    width: 100%;
  }

  /* ---------------- 名单展示 ---------------- */
  .guest-list {
    background: var(--card-bg);
    padding: 30px 24px 36px;
    border-radius: 0 0 20px 20px;
    box-shadow: var(--shadow);
    border-left: 1px solid var(--rose-light);
    border-right: 1px solid var(--rose-light);
    border-bottom: 1px solid var(--rose-light);
  }

  .guest-list .section-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold-dark);
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .guest-list .section-title::after {
    content: '';
    display: block;
    width: 40px; height: 2px;
    background: var(--gold-light);
    margin: 8px auto 0;
    border-radius: 1px;
  }

  .guest-stats {
    text-align: center;
    padding: 16px;
    margin: 10px 0 18px;
    background: linear-gradient(135deg, var(--blush), var(--rose-light));
    border-radius: 12px;
    animation: fadeInUp 0.6s ease;
  }
  .guest-stats .total-label {
    font-size: 12px; color: var(--text-light); letter-spacing: 2px;
  }
  .guest-stats .total-count {
    font-size: 36px; font-weight: 700;
    color: var(--gold-dark);
    line-height: 1.2;
    font-family: 'Cormorant Garamond', serif;
  }
  .guest-stats .total-suffix {
    font-size: 13px; color: var(--text-light);
  }

  .guest-cards {
    display: flex; flex-direction: column; gap: 10px;
  }

  .guest-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid #f0e6da;
    animation: fadeInUp 0.5s ease both;
    transition: all 0.3s ease;
  }
  .guest-card:hover {
    border-color: var(--gold-light);
    box-shadow: 0 4px 16px rgba(200, 164, 92, 0.12);
  }
  .guest-card .guest-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--rose-light), var(--blush));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
    color: var(--rose);
    flex-shrink: 0;
  }
  .guest-card .guest-info {
    flex: 1; margin-left: 12px;
  }
  .guest-card .guest-name {
    font-size: 15px; font-weight: 500; color: var(--text);
  }
  .guest-card .guest-meta {
    font-size: 12px; color: var(--text-light);
  }
  .guest-card .guest-count {
    font-size: 18px; font-weight: 700;
    color: var(--gold-dark);
    font-family: 'Cormorant Garamond', serif;
    min-width: 36px; text-align: center;
  }
  .guest-card .guest-delete {
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: #c4b4a0; font-size: 16px;
    cursor: pointer; border-radius: 50%;
    transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    margin-left: 8px;
  }
  .guest-card .guest-delete:hover {
    color: #d48989;
    background: rgba(212, 137, 137, 0.1);
  }

  .declined-card {
    opacity: 0.6;
    border-style: dashed;
    background: #fdfaf7;
    border-color: #e8ddd0;
  }
  .declined-card .guest-avatar {
    background: #f0ebe5;
  }
  .declined-card .guest-count {
    color: #c4b4a0;
    font-size: 13px;
    font-family: 'Noto Serif SC', serif;
  }

  .empty-state {
    text-align: center;
    padding: 36px 16px;
    color: var(--text-light);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* ---------------- 底部 ---------------- */
  .footer {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-light);
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.7;
  }

  /* ---------------- 动画 ---------------- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .fade-in {
    animation: fadeIn 1s ease both;
  }

  /* Toast */
  .toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--white);
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .hero { padding: 36px 16px 30px; }
    .hero-title { font-size: 26px; letter-spacing: 3px; }
    .hero-couple .name { font-size: 19px; }
    .hero-wreath { width: 100px; height: 100px; }
    .hero-wreath::before { font-size: 34px; }
    .invitation-text { padding: 28px 18px; }
    .info-card, .rsvp-section, .guest-list { padding: 24px 16px; }
    .rsvp-buttons { flex-direction: column; gap: 10px; }
    .btn { padding: 14px 16px; font-size: 14px; }
    .refresh-btn { top: 18px; right: 16px; font-size: 12px; padding: 4px 10px; }
  }
</style>
</head>
<body>

<canvas id="petals-canvas"></canvas>

<div class="main-container">
  <!-- 封面 -->
  <section class="hero fade-in">
    <div class="hero-ornament-top">
      <span class="line"></span><span class="diamond"></span><span class="line"></span>
      <span class="diamond"></span><span class="line"></span><span class="diamond"></span>
      <span class="line"></span>
    </div>
    <div class="hero-date-en">July · 2026</div>
    <div class="hero-wreath"></div>
    <h1 class="hero-title">婚礼请帖</h1>
    <div class="hero-couple">
      <span class="name">张明</span>
      <span class="ampersand">&</span>
      <span class="name">李婉</span>
    </div>
    <div style="margin-top:12px; font-size:13px; color:var(--text-light); letter-spacing:2px;">
      诚挚邀请您的光临
    </div>
  </section>

  <!-- 邀请正文 -->
  <section class="invitation-text fade-in" style="animation-delay:0.2s;">
    <p class="greeting">亲爱的朋友</p>
    <p class="message">
      我们将在今年夏天，<br>
      携手步入婚姻的殿堂。<br>
      一路走来，心中充满感恩。<br>
      愿您能来分享我们的喜悦，<br>
      见证这一幸福时刻。
    </p>
    <div class="ornament-divider">
      <span class="dot"></span><span class="line"></span><span class="dot"></span>
      <span class="line"></span><span class="dot"></span><span class="line"></span>
      <span class="dot"></span>
    </div>
    <p style="font-size:14px; color:var(--text-light); letter-spacing:2px; margin-top:10px;">
      谨定于 · 二零二六年七月十八日
    </p>
  </section>

  <!-- 信息卡片 -->
  <section class="info-card fade-in" style="animation-delay:0.3s;">
    <div class="section-title">婚礼详情</div>
    <div class="info-item">
      <div class="icon">📅</div>
      <div class="info-content">
        <div class="label">日期</div>
        <div class="value">2026年7月18日 星期六</div>
      </div>
    </div>
    <div class="info-item">
      <div class="icon">⏰</div>
      <div class="info-content">
        <div class="label">时间</div>
        <div class="value">下午 17:00 迎宾 · 18:08 仪式</div>
      </div>
    </div>
    <div class="info-item">
      <div class="icon">📍</div>
      <div class="info-content">
        <div class="label">地点</div>
        <div class="value">花园酒店 · 玫瑰厅</div>
        <div style="font-size:12px; color:var(--text-light); margin-top:2px;">上海市静安区南京西路 88 号</div>
      </div>
    </div>
    <div class="info-item">
      <div class="icon">💌</div>
      <div class="info-content">
        <div class="label">着装建议</div>
        <div class="value">正装 / 小礼服</div>
      </div>
    </div>
  </section>

  <!-- RSVP -->
  <section class="rsvp-section fade-in" style="animation-delay:0.4s;">
    <div class="section-title">恭候回音</div>
    <div class="rsvp-form" id="rsvpForm">
      <div class="form-row">
        <label>您的姓名</label>
        <input type="text" id="inputName" placeholder="请输入您的姓名" maxlength="20" autocomplete="off">
      </div>
      <div class="form-row">
        <label>同行人数（含您本人）</label>
        <input type="number" id="inputCount" placeholder="请输入人数" min="1" max="20" value="1">
      </div>
      <div class="rsvp-buttons">
        <button class="btn btn-attend" id="btnAttend" onclick="submitRSVP('attend')">我将出席</button>
        <button class="btn btn-decline" id="btnDecline" onclick="submitRSVP('decline')">无法参加</button>
      </div>
    </div>
  </section>

  <!-- 名单 -->
  <section class="guest-list fade-in" style="animation-delay:0.5s;">
    <div class="guest-list-header">
      <div class="section-title">来宾名录</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshGuestList()" title="刷新名单">
        <span class="refresh-icon">↻</span> 刷新
      </button>
    </div>
    <div class="guest-stats" id="guestStats">
      <div class="total-label">已确认出席总人数</div>
      <div class="total-count" id="totalCount">0</div>
      <div class="total-suffix">人</div>
    </div>
    <div class="guest-cards" id="guestCards">
      <div class="empty-state">暂无回复，期待您的参与</div>
    </div>
  </section>

  <!-- 底部 -->
  <div class="footer">
    张明 &amp; 李婉 · 期待与您相见
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ Supabase 客户端 ============
const SUPABASE_URL = 'https://vfpjfiuqvntzoqatjytx.supabase.co';  // 例如 https://xxxxx.supabase.co
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcGpmaXVxdm50em9xYXRqeXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTEwNzcsImV4cCI6MjA5ODY2NzA3N30.ot0bcRXkT0dGa-zk1a4dS2nFdBM2M4m7BDfhoWCukUY';       // 例如 eyJhbGciOi...
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE_NAME = 'guests';

// ============ Toast ============
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============ 从 Supabase 加载名单 ============
async function loadGuests() {
  const { data, error } = await supabase
    .from(TABLE_NAME)
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('加载名单失败:', error);
    return [];
  }
  return data || [];
}

// ============ 提交 RSVP ============
async function submitRSVP(type) {
  const nameInput = document.getElementById('inputName');
  const countInput = document.getElementById('inputCount');
  const btnAttend = document.getElementById('btnAttend');
  const btnDecline = document.getElementById('btnDecline');
  const name = nameInput.value.trim();
  const count = parseInt(countInput.value) || 1;

  if (!name) {
    showToast('请输入您的姓名');
    nameInput.focus();
    return;
  }

  // 加载已有名单，检查重名
  const guests = await loadGuests();
  if (guests.some(g => g.name === name)) {
    showToast('您已提交过回复，如需修改请删除后重新提交');
    return;
  }

  // 进入 loading 状态
  btnAttend.disabled = true;
  btnDecline.disabled = true;
  if (type === 'attend') {
    btnAttend.textContent = '提交中...';
  } else {
    btnDecline.textContent = '提交中...';
  }

  const guest = {
    name,
    count: type === 'attend' ? Math.min(Math.max(count, 1), 20) : 0,
    status: type,
    time: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  };

  const { error } = await supabase.from(TABLE_NAME).insert([guest]);

  // 恢复按钮状态
  btnAttend.disabled = false;
  btnDecline.disabled = false;
  btnAttend.textContent = '我将出席';
  btnDecline.textContent = '无法参加';

  if (error) {
    console.error('提交失败:', error);
    showToast('网络错误，请重试');
    return;
  }

  // 重新拉取数据刷新列表
  await renderGuestList();

  // 清空表单
  nameInput.value = '';
  countInput.value = '1';

  const msg = type === 'attend'
    ? `${name}，感谢您的出席！已登记 ${guest.count} 人`
    : `${name}，虽不能至，心意已收到`;
  showToast(msg);
}

// ============ 删除 ============
async function deleteGuest(id) {
  const { error } = await supabase.from(TABLE_NAME).delete().eq('id', id);

  if (error) {
    console.error('删除失败:', error);
    showToast('网络错误，请重试');
    return;
  }

  await renderGuestList();
  showToast('已删除该记录');
}

// ============ 刷新按钮 ============
async function refreshGuestList() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  try {
    await renderGuestList();
  } catch {
    showToast('网络错误，请重试');
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

// ============ 渲染名单 ============
async function renderGuestList() {
  const guests = await loadGuests();
  const container = document.getElementById('guestCards');
  const totalEl = document.getElementById('totalCount');

  // 统计出席人数
  const totalAttend = guests
    .filter(g => g.status === 'attend')
    .reduce((sum, g) => sum + g.count, 0);
  totalEl.textContent = totalAttend;

  if (guests.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无回复，期待您的参与</div>';
    return;
  }

  // 出席在前，不出席在后
  const sorted = [...guests].sort((a, b) => {
    if (a.status === 'attend' && b.status !== 'attend') return -1;
    if (a.status !== 'attend' && b.status === 'attend') return 1;
    return 0;
  });

  let html = '';
  sorted.forEach((g, idx) => {
    const initial = g.name.charAt(0);
    const isDeclined = g.status === 'decline';
    const cardClass = isDeclined ? 'declined-card' : '';
    const styleDelay = `animation-delay:${idx * 0.06}s`;

    html += `
      <div class="guest-card ${cardClass}" style="${styleDelay}">
        <div class="guest-avatar">${escapeHtml(initial)}</div>
        <div class="guest-info">
          <div class="guest-name">${escapeHtml(g.name)}</div>
          <div class="guest-meta">${escapeHtml(g.time || '')}</div>
        </div>
        <div class="guest-count">${isDeclined ? '遗憾' : g.count + '人'}</div>
        <button class="guest-delete" onclick="deleteGuest(${g.id})" title="删除">&times;</button>
      </div>
    `;
  });

  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ 回车提交 ============
document.getElementById('inputCount').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitRSVP('attend');
});
document.getElementById('inputName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('inputCount').focus();
});

// ============ 花瓣飘落动画 ============
(function() {
  const canvas = document.getElementById('petals-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, petals = [];
  const PETAL_COUNT = 28;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  const petalPaths = [
    // 椭圆花瓣
    (ctx, s) => { ctx.ellipse(0, 0, s * 8, s * 5, 0, 0, Math.PI * 2); },
    // 心形花瓣
    (ctx, s) => {
      ctx.moveTo(0, s * 6);
      ctx.bezierCurveTo(-s * 5, s * 4, -s * 5, 0, 0, -s * 3);
      ctx.bezierCurveTo(s * 5, 0, s * 5, s * 4, 0, s * 6);
    },
    // 圆润花瓣
    (ctx, s) => {
      ctx.moveTo(0, s * 5);
      ctx.quadraticCurveTo(-s * 6, s * 2, 0, -s * 4);
      ctx.quadraticCurveTo(s * 6, s * 2, 0, s * 5);
    }
  ];

  class Petal {
    constructor() {
      this.reset(true);
    }
    reset(initial) {
      this.x = Math.random() * width;
      this.y = initial ? Math.random() * height : -30;
      this.size = 0.6 + Math.random() * 1.4;
      this.speed = 0.3 + Math.random() * 1.2;
      this.wind = (Math.random() - 0.5) * 0.5;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.03;
      this.opacity = 0.15 + Math.random() * 0.25;
      this.shape = Math.floor(Math.random() * petalPaths.length);
      // 柔和的金粉/花瓣色
      const colors = [
        [232, 210, 190], // 米金
        [245, 215, 210], // 浅粉
        [255, 240, 230], // 奶白
        [220, 185, 155], // 浅金
        [240, 200, 195], // 玫瑰粉
        [250, 235, 220], // 暖白
      ];
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.color = `rgba(${c[0]},${c[1]},${c[2]},${this.opacity})`;
    }
    update() {
      this.y += this.speed;
      this.x += Math.sin(this.y * 0.02) * this.wind;
      this.rotation += this.rotationSpeed;
      if (this.y > height + 40) this.reset(false);
    }
    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      petalPaths[this.shape](ctx, this.size);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function init() {
    resize();
    petals = Array.from({ length: PETAL_COUNT }, () => new Petal());
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);
    petals.forEach(p => { p.update(); p.draw(ctx); });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  init();
  animate();
})();

// ============ 初始渲染 ============
renderGuestList();
</script>
</body>
</html>
